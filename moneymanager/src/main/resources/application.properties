#Mysql Configuration


server.servlet.context-path=/api/v1.0

#JPA Configuration

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

jwt.secret=money-manager-jwt-secret-key-2026-stable-please-change

#Email Configuration

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME:}
spring.mail.password=${BREVO_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
app.mail.from=${BREVO_FROM_EMAIL:${spring.mail.username:}}

money.manager.frontend.url=${MONEY_MANAGER_FRONT_URL:http://localhost:3000}

app.activation.url=${MONEY_MANAGER_BACKEND_URL:http://localhost:8080}


